services:
  - type: web
    name: discord-bump-bot
    runtime: node
    plan: free
    buildCommand: ""
    startCommand: node index.js
    healthCheckPath: /health
    envVars:
      - key: DISCORD_TOKEN
        sync: false
      - key: CLIENT_ID
        sync: false
      - key: GUILD_ID
        sync: false
      - key: REMINDER_CHANNEL_ID
        sync: false
      - key: AUTO_START
        value: "true"
      - key: NODE_VERSION
        value: "20"